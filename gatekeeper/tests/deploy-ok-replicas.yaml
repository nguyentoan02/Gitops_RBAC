apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-ok-replicas
  namespace: demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: test-ok-replicas
  template:
    metadata:
      labels:
        app: test-ok-replicas
    spec:
      containers:
      - name: nginx
        image: nginx:1.27.0
        securityContext:
          runAsUser: 1000
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
