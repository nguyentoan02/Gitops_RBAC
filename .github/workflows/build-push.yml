# Build, scan, sign, and push Docker image to GitHub Container Registry
name: Build Scan Sign Push Image

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Set image name
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${REGISTRY}/${owner}/w10-api" >> "$GITHUB_OUTPUT"
          echo "version=${{ steps.semver.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=v${{ steps.semver.outputs.version }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally for scanning
        run: |
          docker build \
            -t ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }} \
            -t ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha_tag }} \
            ./src/api

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Push image tags
        run: |
          docker push ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}
          docker push ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha_tag }}

      - name: Resolve pushed image digest
        id: digest
        shell: bash
        run: |
          digest="$(docker image inspect ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }} --format='{{index .RepoDigests 0}}')"
          echo "value=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY ${{ steps.digest.outputs.value }}

      - name: Update rollout.yaml with new version
        run: |
          sed -i "s|image: .*|image: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}|g" app-api/rollout.yaml
          sed -i "0,/value: \"v.*\"/s//value: \"v${{ steps.image.outputs.version }}\"/" app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Create git tag
        run: |
          if git rev-parse "v${{ steps.semver.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag v${{ steps.semver.outputs.version }}
            git push origin v${{ steps.semver.outputs.version }}
          fi
